<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.name }} - Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        :root { --border: #e1e1e0; --bg: #f7f7f5; --accent: #2383e2; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: #37352f; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 24px; flex: 1; min-width: 200px; }
        .header-btns { display: flex; gap: 10px; }
        .block-label { font-size: 12px; font-weight: 600; color: #9b9a97; text-transform: uppercase; margin-bottom: 8px; }
        .source-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .source-pill { background: #f1f1f0; padding: 4px 12px; border-radius: 15px; font-size: 12px; color: #37352f; border: 1px solid var(--border); text-decoration: none; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #graphWrapper { background: #fff; border: 1px solid var(--border); border-radius: 8px; margin: 20px 0; padding: 10px; position: relative; overflow: hidden; min-height: 500px; }
        #cy { width: 100%; height: 500px; background-color: #fcfcfc; }
        .hidden { display: none !important; }

        #graphLoader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        .chat-container { background: var(--bg); border-radius: 8px; padding: 15px; height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg.ai { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .typing { display: flex; gap: 4px; padding: 5px 0; }
        .typing span { width: 6px; height: 6px; background: #9b9a97; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        .input-block { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 4px; outline: none; font-size: 14px; min-width: 0; }
        button { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 14px; white-space: nowrap; }
        .btn-secondary { background: white; color: #37352f; border: 1px solid var(--border); }
        #status { font-size: 12px; color: #73726e; margin-top: 5px; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 {{ project.name }}</h1>
            <div class="header-btns">
                <button onclick="buildGraph()" class="btn-secondary">🌐 Connection Tree</button>
                <button onclick="window.location.href='/project/{{ project.project_uuid }}/write'" class="btn-secondary">📝 Writing Mode</button>
            </div>
        </header>

        <div id="graphWrapper" class="hidden">
            <div id="graphLoader" class="hidden">
                <div class="spinner"></div>
                <div id="loaderText" style="font-size: 12px; color: #666;">Mapping connections...</div>
            </div>
            <div id="cy"></div>
            <button onclick="document.getElementById('graphWrapper').classList.add('hidden')" style="position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); color: #333; padding: 6px 12px; font-size: 11px; width: auto; border: 1px solid #ccc; border-radius: 4px; z-index: 110;">Close Map</button>
        </div>

        <section style="margin: 30px 0;">
            <div class="block-label">Active Sources</div>
            <div id="sourceContainer" class="source-list">
                {% for source in project.sources %}
                    <a href="{{ source.url }}" target="_blank" class="source-pill">🔗 {{ source.url }}</a>
                {% endfor %}
            </div>
            <div class="input-block">
                <input type="text" id="urlInput" placeholder="Paste link (e.g. Wikipedia)...">
                <button id="addSourceBtn" onclick="ingestUrl()">Add Source</button>
            </div>
            <div id="status"></div>
        </section>

        <section>
            <div class="block-label">Chat</div>
            <div id="chatHistory" class="chat-container">
                {% for msg in messages %}
                    <div class="msg {{ 'user' if msg.role == 'user' else 'ai render-md' }}">
                        {{ msg.content }}
                    </div>
                {% endfor %}
            </div>
            <div class="input-block">
                <input type="text" id="chatInput" placeholder="Ask about your sources..." onkeypress="if(event.key==='Enter') sendChat()">
                <button onclick="sendChat()">Ask</button>
            </div>
        </section>
    </div>

    <script>
        const projectUuid = "{{ project.project_uuid }}";

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.render-md').forEach(el => {
                el.innerHTML = marked.parse(el.textContent.trim());
            });
            const history = document.getElementById('chatHistory');
            history.scrollTop = history.scrollHeight;
        });

        async function ingestUrl() {
            const urlInput = document.getElementById('urlInput');
            const btn = document.getElementById('addSourceBtn');
            const url = urlInput.value;
            const status = document.getElementById('status');
            const sourceContainer = document.getElementById('sourceContainer');

            if(!url) return;
            status.innerText = "⏳ Processing...";
            btn.disabled = true;

            try {
                const res = await fetch(`/ingest/${projectUuid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                if (data.status) {
                    const pill = document.createElement('a');
                    pill.href = url; pill.target = "_blank"; pill.className = "source-pill";
                    pill.innerText = "🔗 " + url;
                    sourceContainer.appendChild(pill);
                    status.innerText = "✅ Added!";
                    urlInput.value = "";
                } else {
                    status.innerText = "❌ " + data.error;
                }
            } catch (err) {
                status.innerText = "❌ Error.";
            } finally {
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const history = document.getElementById('chatHistory');
            const msg = input.value;
            if(!msg) return;

            history.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = "";

            const thinkingId = "thinking-" + Date.now();
            history.innerHTML += `
                <div class="msg ai" id="${thinkingId}">
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>`;
            history.scrollTop = history.scrollHeight;

            try {
                const res = await fetch(`/chat/${projectUuid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                const thinkingMsg = document.getElementById(thinkingId);
                thinkingMsg.innerHTML = marked.parse(data.reply);
            } catch (err) {
                document.getElementById(thinkingId).innerText = "Error getting response.";
            }
            history.scrollTop = history.scrollHeight;
        }

        async function buildGraph() {
            const wrapper = document.getElementById('graphWrapper');
            const loader = document.getElementById('graphLoader');
            const loaderText = document.getElementById('loaderText');

            wrapper.classList.remove('hidden');
            loader.classList.remove('hidden');
            loaderText.innerText = "Fetching research data...";

            try {
                const res = await fetch(`/graph/${projectUuid}`);
                const data = await res.json();

                if (!data.nodes || data.nodes.length === 0) {
                    loaderText.innerText = "No connections found in these sources yet.";
                    setTimeout(() => loader.classList.add('hidden'), 2000);
                    return;
                }

                const elements = [];
                data.nodes.forEach(n => elements.push({ data: { id: n.id, label: n.label } }));
                if(data.edges) {
                    data.edges.forEach(e => {
                        elements.push({ data: { source: e.source, target: e.target, label: e.label || "connected" } });
                    });
                }

                const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: elements,
      style: [
          {
              selector: 'node',
              style: {
                  'label': 'data(label)',
                  'background-color': '#2383e2',
                  'color': '#37352f',
                  'font-size': '10px', // Slightly smaller font helps with crowding
                  'text-wrap': 'wrap',
                  'text-max-width': '80px',
                  'text-valign': 'bottom',
                  'text-margin-y': '5px',
                  'width': '12px',
                  'height': '12px',
                  'font-weight': '500'
              }
          },
          {
              selector: 'edge',
              style: {
                  'width': 1,
                  'line-color': '#d1d1cf',
                  'label': 'data(label)',
                  'font-size': '8px',
                  'color': '#999',
                  'target-arrow-shape': 'triangle',
                  'target-arrow-color': '#d1d1cf',
                  'curve-style': 'bezier',
                  'text-rotation': 'autorotate',
                  'opacity': 0.6
              }
          }
      ],
      layout: {
          name: 'cose',
          animate: true,
          refresh: 20,
          fit: true,
          padding: 50,
          randomize: true,          // Starts nodes in random spots so they don't clump at 0,0
          nodeRepulsion: 8000000,   // Extreme repulsion to force the "Eminescu" cluster apart
          idealEdgeLength: 150,     // Increases the length of the lines
          edgeElasticity: 0.45,     // Allows edges to stretch more
          nodeOverlap: 100,         // Extra buffer zone around each node
          gravity: 0.1,             // Lower gravity stops them from being pulled to the center
          numIter: 1500,            // More iterations to let the physics settle
          initialTemp: 1000         // Higher initial "energy" to shake them out of the clump
      }
  });
                cy.ready(() => {
                    loader.classList.add('hidden');
                });

            } catch (err) {
                console.error("Graph Error:", err);
                loaderText.innerText = "Error building graph. Try adding more sources.";
                setTimeout(() => {
                    loader.classList.add('hidden');
                    wrapper.classList.add('hidden');
                }, 3000);
            }
        }
    </script>
</body>
</html>
