<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - Nomos Analyst</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --secondary-bg: #f7f7f5;
            --border-color: #e1e1e0;
            --text-main: #37352f;
            --text-secondary: #73726e;
            --accent-blue: #2383e2;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px; /* Reduced default padding for better fit */
        }

        /* Responsive Navigation */
        .user-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 15px;
        }

        .user-info {
            font-size: 14px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-link {
            color: #eb5757;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0;
        }

        /* Header responsiveness */
        header h1 {
            font-size: clamp(28px, 8vw, 40px); /* Fluid typography */
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* Project Grid - Dynamic columns */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); /* Default to full width on tiny screens */
            gap: 20px;
            margin-top: 20px;
        }

        /* Medium screens and up */
        @media (min-width: 480px) {
            .project-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        .project-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            text-decoration: none;
            color: var(--text-main);
            transition: background 0.2s ease, transform 0.1s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100px;
        }

        .project-card:hover {
            background-color: var(--secondary-bg);
            transform: translateY(-2px);
        }

        .project-card .icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .project-card .name {
            font-weight: 600;
            font-size: 16px;
        }

        /* New Project Input */
        .new-project-card {
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            background: none;
            cursor: default;
        }

        .new-project-card input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            padding: 8px 0;
            outline: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .new-project-card input:focus {
            border-color: var(--accent-blue);
        }

        .new-project-card button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%; /* Full width button for better mobile tapping */
        }

        @media (min-width: 480px) {
            .new-project-card button {
                width: auto;
            }
        }

        /* Adjust top padding on mobile */
        @media (max-width: 600px) {
            .dashboard-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="user-nav">
            <div class="user-info">
                <strong>{{ current_user.email }}</strong>'s Workspace
            </div>
            <a href="/logout" class="logout-link">Log out</a>
        </nav>

        <header>
            <h1>🚀 Workspace</h1>
            <p>Select a project to start analyzing sources.</p>
        </header>

        <div class="project-grid">
            {% for project in projects %}
            <a href="/project/{{ project.project_uuid }}" class="project-card">
                <div class="icon">📁</div>
                <div class="name">{{ project.name }}</div>
            </a>
            {% endfor %}

            <div class="new-project-card">
                <form action="/create_project" method="POST">
                    <input type="text" name="name" placeholder="+ New Project name..." required>
                    <button type="submit">Create Project</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
